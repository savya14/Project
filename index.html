<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Hub // Project Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ee;
            --ink: #0f0f0d;
            --rule: #0f0f0d; /* High contrast black borders */
            --dim: #6b6860;
            --accent: #5b2fa8;
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --ink: #f5f3ee;
            --rule: #f5f3ee;
            --dim: #90908a;
            --accent: #a580ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            padding: 0;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        nav {
            border-bottom: 2px solid var(--rule);
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Main Grid Layout */
        .wrapper {
            display: grid;
            grid-template-columns: 1fr 400px;
            min-height: calc(100vh - 54px);
        }

        /* Left Side: Hero Section */
        .main-content {
            padding: 4rem;
            border-right: 2px solid var(--rule);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 800;
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -0.06em;
            margin-bottom: 2rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .nav-item {
            border-top: 2px solid var(--rule);
            padding: 2.5rem 0;
            text-decoration: none;
            color: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: rgba(0,0,0,0.03);
            padding-left: 1rem;
        }

        [data-theme="dark"] .nav-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .nav-item h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        .nav-item .label {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            transform: rotate(-90deg);
            color: var(--dim);
        }

        /* Right Side: Sidebar Information */
        .sidebar {
            padding: 4rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .data-block {
            border: 1px solid var(--rule);
            padding: 1.5rem;
        }

        .data-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 1rem;
            display: block;
        }

        .data-value {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .theme-btn {
            background: var(--ink);
            color: var(--bg);
            border: none;
            padding: 1rem;
            font-family: 'DM Mono', monospace;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            margin-top: auto;
        }

        @media (max-width: 1000px) {
            .wrapper { grid-template-columns: 1fr; }
            .sidebar { border-top: 2px solid var(--rule); }
            .main-content { border-right: none; }
        }
    </style>
</head>
<body>

    <nav>
        <span>MNYBT_SYS_V4.0</span>
        <span id="clock">00:00:00</span>
        <span>STATUS: ACTIVE</span>
    </nav>

    <div class="wrapper">
        <main class="main-content">
            <header>
                <h1>Project<br>Hub.</h1>
            </header>

            <div class="links-container">
                <a href="dlproject-order-roadmap.html" class="nav-item">
                    <h2>Roadmap</h2>
                    <span class="label">01 // VISUAL</span>
                </a>
                <a href="lplacement-tracker.html" class="nav-item" style="border-bottom: 2px solid var(--rule);">
                    <h2>Tracker</h2>
                    <span class="label">02 // DATA</span>
                </a>
            </div>
        </main>

        <aside class="sidebar">
            <div class="data-block">
                <span class="data-label">Current Phase</span>
                <span class="data-value">FCB_EDITION_04</span>
            </div>

            <div class="data-block">
                <span class="data-label">Core Integration</span>
                <span class="data-value">YOLOv8 + xG</span>
            </div>

            <div class="data-block">
                <span class="data-label">System Logs</span>
                <p style="font-family: 'DM Mono', monospace; font-size: 0.75rem; line-height: 1.8;">
                    > Initializing Project Repo<br>
                    > Tracking active via Main<br>
                    > Deployment successful
                </p>
            </div>

            <button class="theme-btn" onclick="toggleTheme()">Change_Environment</button>
        </aside>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.hasAttribute('data-theme');
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                localStorage.setItem('xg_theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                localStorage.setItem('xg_theme', 'dark');
            }
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || localStorage.getItem('xg_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
